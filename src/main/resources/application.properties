# ========================
# Application Settings
# ========================
spring.application.name=shift-happens

# ========================
# Datasource / MySQL
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.connection-timeout=30000

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ========================
# Password Security
# ========================
# Pepper: a server-side secret prepended to passwords BEFORE BCrypt hashing.
# BCrypt already generates a unique random salt per hash (stored in the hash itself),
# so salt is automatic. The pepper adds a second layer: even if the DB is leaked,
# attackers can't crack passwords without knowing this secret.
# Must be set via environment variable — app will refuse to start without it.
security.pepper=${PASSWORD_PEPPER}

# ========================
# MongoDB
# ========================
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/shift_happens}

# ========================
# Neo4j
# ========================
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:neo4jpassword}

# ========================
# Logging
# ========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

