# ========================
# Application Settings
# ========================
spring.application.name=shift-happens

# ========================
# Datasource / MySQL
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.leak-detection-threshold=2000

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET:shift-happens-default-secret-key-change-in-production-min-32-chars}
jwt.expiration-ms=86400000

# ========================
# Password Security
# ========================
# Pepper: a server-side secret prepended to passwords BEFORE BCrypt hashing.
# BCrypt already generates a unique random salt per hash (stored in the hash itself),
# so salt is automatic. The pepper adds a second layer: even if the DB is leaked,
# attackers can't crack passwords without knowing this secret.
# In production, override via environment variable.
security.pepper=${PASSWORD_PEPPER:SH_SECRET_PEPPER_2024}

# ========================
# Logging
# ========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

