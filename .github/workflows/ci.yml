name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Lint Java Code
  lint-java:
    name: Java Linting (Spotless / Palantir)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Spotless check
        run: ./mvnw spotless:check

  # Job 2: Run test suite and generate coverage
  testsuite-java:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root
          MYSQL_DATABASE: shift_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run DB init scripts
        run: |
          for f in $(ls docker/init/*.sql | sort); do
            echo "Running $f..."
            mysql -h 127.0.0.1 -uroot -pci_root shift_ci < "$f"
          done

      - name: Run tests with coverage
        run: ./mvnw test
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/shift_ci
          DB_USERNAME: root
          DB_PASSWORD: ci_root
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PASSWORD_PEPPER: ${{ secrets.PASSWORD_PEPPER }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/jacoco.xml

  # Job 3: SonarCloud Analysis (requires coverage from testsuite-java)
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: testsuite-java
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for accurate analysis

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-report
          path: target/site/jacoco

      - name: SonarCloud Scan
        run: ./mvnw compile sonar:sonar -DskipTests
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
