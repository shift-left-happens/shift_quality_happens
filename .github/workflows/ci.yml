name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Lint Java Code
  lint-java:
    name: Java Linting (Spotless / Palantir)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Spotless check
        run: ./mvnw spotless:check

  # Job 2: Run test suite and generate coverage
  testsuite-java:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-java
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root
          MYSQL_DATABASE: shift_happens
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run DB init scripts
        run: |
          for f in docker/init/*.sql; do
            echo "Running $f..."
            mysql -h 127.0.0.1 -uroot -pci_root shift_happens < "$f"
          done

      - name: Run tests with coverage
        run: ./mvnw test
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/shift_happens
          DB_USERNAME: root
          DB_PASSWORD: ci_root
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PASSWORD_PEPPER: ${{ secrets.PASSWORD_PEPPER }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/jacoco.xml

  # Job 3: SonarCloud Analysis (requires coverage from testsuite-java and E2E results)
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [testsuite-java, playwright-e2e]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for accurate analysis

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-report
          path: target/site/jacoco

      - name: Compile and collect dependencies
        run: ./mvnw compile dependency:copy-dependencies -DskipTests -DoutputDirectory=target/dependency

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 4: Run Playwright E2E tests
  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: testsuite-java
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root
          MYSQL_DATABASE: shift_happens
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Set up Java 21 (for Backend)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run DB init scripts
        run: |
          for f in docker/init/*.sql; do
            echo "Running $f..."
            mysql -h 127.0.0.1 -uroot -pci_root shift_happens < "$f"
          done

      - name: Build and Start Backend
        run: |
          nohup ./mvnw spring-boot:run > backend.log 2>&1 &
          echo "Waiting for backend to be ready..."
          timeout 60s bash -c 'until curl -s http://localhost:8080/auth/login > /dev/null; do sleep 5; done' || (cat backend.log && exit 1)
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/shift_happens
          DB_USERNAME: root
          DB_PASSWORD: ci_root
          JWT_SECRET: testing-secret-key-at-least-32-chars-long-12345
          PASSWORD_PEPPER: testing-pepper
          SERVER_PORT: 8080

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          TEST_USER_EMAIL: sofie.jensen@hospital.dk
          TEST_USER_PASSWORD: password123
          API_URL: http://localhost:8080
          BASE_URL: http://localhost:5173
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
