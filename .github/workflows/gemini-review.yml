name: "Gemini AI Code Review"

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**.md'
      - '**.json'
      - 'package-lock.json'
      - 'target/**'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to post comments
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Gemini AI Review"
        uses: google-github-actions/run-gemini-cli@v1 # Official Google action
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a Senior Java Developer. Review this PR for:
            1. Logic errors and potential bugs.
            2. Security vulnerabilities (SQL injection, etc).
            3. Clean code and performance improvements.
            Keep feedback constructive and concise.