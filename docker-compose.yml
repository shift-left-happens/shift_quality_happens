services:
  db:
    image: mysql:8.0
    container_name: shift-happens-db
    command: --event-scheduler=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: shift-happens-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${LOCAL_DB_USERNAME}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER}
      MONGO_URI: mongodb://mongodb:27017/shift_happens
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: shift-happens-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  neo4j:
    image: neo4j:5
    container_name: shift-happens-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
      - ./src/main/resources/neo4_graf:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD}\" \"RETURN 1;\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  neo4j-init:
    image: neo4j:5
    container_name: shift-happens-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./src/main/resources/neo4_graf/neo4j-schema.cypher:/init/neo4j-schema.cypher:ro
    entrypoint: ["cypher-shell"]
    command: ["-a", "bolt://neo4j:7687", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "-f", "/init/neo4j-schema.cypher"]
    restart: "no"

volumes:
  db-data:
  mongo-data:
  neo4j-data: