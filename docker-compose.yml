services:
  db:
    image: mysql:8.0
    container_name: shift-quality-happens-db
    command: --event-scheduler=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysql", "-u${APP_DB_USER}", "-p${APP_DB_PASSWORD}", "-e", "SELECT 1 FROM ${MYSQL_DATABASE}.employee LIMIT 1;"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: shift-quality-happens-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
